/* ============ FAB ============ */
.fab {

  font-size: 32px; font-weight: 300;

  z-index: 60; transition: all 0.2s cubic-bezier(.2,.8,.2,1); line-height: 1;
}
.fab:hover { transform: scale(1.06) rotate(90deg); }
.fab:active { transform: scale(0.96); }

/* ============ Modal ============ */
.modal-backdrop {
  position: fixed; inset: 0;
  background: rgba(15,14,12,0.55);
  z-index: 100;
  display: flex; align-items: flex-end; justify-content: center;
  opacity: 0; pointer-events: none;
  transition: opacity 0.2s;
  backdrop-filter: blur(4px); -webkit-backdrop-filter: blur(4px);
}
.modal-backdrop.show { opacity: 1; pointer-events: auto; }
.modal {
  background: var(--bg); width: 100%; max-width: 540px;
  max-height: 92vh; max-height: 92dvh;
  border-radius: 26px 26px 0 0;
  display: flex; flex-direction: column;
  transform: translateY(100%);
  transition: transform 0.3s cubic-bezier(0.32, 0.72, 0, 1);
  box-shadow: 0 -12px 40px rgba(15,14,12,0.20);
}
.modal-backdrop.show .modal { transform: translateY(0); }
@media (min-width: 540px) {

  .modal { border-radius: 26px; max-height: 88vh; }
}
.modal-handle {

  border-radius: 999px; margin: 10px auto 4px; flex-shrink: 0;
}

.modal-body { padding: 20px; overflow-y: auto; flex: 1; -webkit-overflow-scrolling: touch; }
.modal-foot {

  display: flex; gap: 8px; flex-shrink: 0; background: var(--bg-elev);
}

.btn-primary { background: var(--ink); color: var(--bg); flex: 1; }
.btn-primary:hover, .btn-primary:active { background: #000; transform: translateY(-1px); }
.btn-primary:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }
.btn-secondary { background: var(--bg-elev); color: var(--ink); border: 1.5px solid var(--line); }
.btn-danger { background: var(--accent); color: white; }
.btn-danger:hover { background: var(--accent-deep); }
.btn-success { background: var(--green); color: white; flex: 1; }
.btn-ghost { background: transparent; color: var(--ink-soft); padding: 10px 14px; }
.btn-ghost:hover { background: var(--bg-deep); color: var(--ink); }

/* ============ Detail ============ */
.detail-title {
  font-family: 'Frank Ruhl Libre', serif; font-size: 26px;
  font-weight: 800; line-height: 1.25;
  margin-bottom: 16px; word-break: break-word; letter-spacing: -0.015em;
}
.detail-meta-grid {
  background: var(--bg-elev); border: 1px solid var(--line);
  border-radius: 16px; padding: 4px 14px;
  margin-bottom: 18px; box-shadow: var(--shadow-sm);
}
.detail-meta-row {
  display: flex; align-items: center; justify-content: space-between;
  padding: 11px 4px; border-bottom: 1px solid var(--line);
  font-size: 14px; gap: 12px;
}
.detail-meta-row:last-child { border-bottom: none; }
.detail-meta-label { color: var(--ink-faint); font-weight: 600; flex-shrink: 0; font-size: 13px; }
.detail-meta-value { font-weight: 700; text-align: left; display: flex; align-items: center; gap: 6px; }
.detail-meta-value.overdue { color: var(--accent); }
.detail-desc {
  background: var(--bg-elev); border: 1px solid var(--line);
  border-radius: 16px; padding: 14px 16px;
  font-size: 15px; color: var(--ink-soft); line-height: 1.6;
  margin-bottom: 18px; white-space: pre-wrap;
  word-break: break-word; box-shadow: var(--shadow-sm);
}
.detail-desc.empty { color: var(--ink-faint); font-style: italic; text-align: center; padding: 22px; }
.section-title {
  font-size: 12px; font-weight: 800;
  letter-spacing: 0.06em; text-transform: uppercase;
  color: var(--ink-faint); margin: 20px 0 10px;
}
.status-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; }
.status-option {
  padding: 11px 12px; background: var(--bg-elev);
  border: 1.5px solid var(--line); border-radius: 12px;
  font-size: 14px; font-weight: 700;
  display: flex; align-items: center; gap: 8px;
  transition: all 0.15s; text-align: right;
}
.status-option .status-dot { width: 9px; height: 9px; }
.status-option[data-status="open"] { color: var(--blue); }
.status-option[data-status="in_progress"] { color: var(--gold); }
.status-option[data-status="waiting"] { color: var(--purple); }
.status-option.active { border-color: var(--ink); background: var(--ink); color: white !important; }
.status-option.active .status-dot { background: white; }
.comments-list { display: flex; flex-direction: column; gap: 8px; }
.comment {
  padding: 11px 14px; background: var(--bg-elev);
  border: 1px solid var(--line); border-radius: 12px;
  font-size: 14px; box-shadow: var(--shadow-sm);
}
.comment.own { background: var(--accent-soft); border-color: rgba(210,68,20,0.2); }
.comment-head {
  display: flex; justify-content: space-between;
  font-size: 12px; color: var(--ink-faint);
  margin-bottom: 4px; font-weight: 700;
}
.comment-head .author { color: var(--ink-soft); }
.comment-text { white-space: pre-wrap; word-break: break-word; line-height: 1.5; color: var(--ink); }
.comments-empty {
  color: var(--ink-faint); font-size: 13px;
  text-align: center; padding: 14px; font-style: italic;
}
.comment-form { display: flex; gap: 6px; margin-top: 10px; }
.comment-form input {
  flex: 1; padding: 11px 14px;
  background: var(--bg-elev); border: 1.5px solid var(--line);
  border-radius: 12px; font-size: 14.5px;
  outline: none; transition: border-color 0.15s;
}
.comment-form input:focus { border-color: var(--ink); }
.comment-form button {
  padding: 0 18px; background: var(--ink); color: var(--bg);
  border-radius: 12px; font-size: 14px; font-weight: 700;
}
[hidden] { display: none !important; }

/* ============ Toast ============ */
.toast {
  position: fixed; bottom: 100px; left: 50%;
  transform: translateX(-50%) translateY(40px);
  background: var(--ink); color: var(--bg);
  padding: 10px 18px; border-radius: 999px;
  font-size: 14px; font-weight: 600;
  z-index: 200; opacity: 0;
  transition: all 0.25s; pointer-events: none;
  box-shadow: var(--shadow-lg); max-width: 90vw;
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

/* ============ Animations ============ */
@keyframes slideInUp {
  from { opacity: 0; transform: translateY(8px); }
  to { opacity: 1; transform: translateY(0); }
}
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
.task-card { animation: slideInUp 0.25s ease-out backwards; }
.task-list .task-card:nth-child(1) { animation-delay: 0.02s; }
.task-list .task-card:nth-child(2) { animation-delay: 0.04s; }
.task-list .task-card:nth-child(3) { animation-delay: 0.06s; }
.task-list .task-card:nth-child(4) { animation-delay: 0.08s; }
.task-list .task-card:nth-child(5) { animation-delay: 0.10s; }
.task-list .task-card:nth-child(n+6) { animation-delay: 0.12s; }
.login-card { animation: slideInUp 0.4s cubic-bezier(.2,.8,.2,1); }
.brand-logo { animation: fadeIn 0.6s 0.1s backwards; }
</style>
</head>

<script type="module">

const HEBREW_DAYS = ['יום ראשון', 'יום שני', 'יום שלישי', 'יום רביעי', 'יום חמישי', 'יום שישי', 'שבת'];
const HEBREW_MONTHS = ['ינואר', 'פברואר', 'מרץ', 'אפריל', 'מאי', 'יוני', 'יולי', 'אוגוסט', 'ספטמבר', 'אוקטובר', 'נובמבר', 'דצמבר'];

const STATUS = {
  open: { label: 'פתוח', cls: 'open' },
  in_progress: { label: 'בטיפול', cls: 'in_progress' },
  waiting: { label: 'ממתין', cls: 'waiting' },
  done: { label: 'בוצע', cls: 'done' },
};
const USER_LABEL = { moshe: 'משה סעדה', office: 'יפעה' };
const USER_INITIAL = { moshe: 'מ', office: 'מ' };
const ASSIGN_LABEL = { office: 'יפעה', moshe: 'משה סעדה' };

const state = {
  user: null,
  tasks: {},
  activeTab: 'active',
  filterAssignee: 'all',
  search: '',
  editingTaskId: null,
  viewingTaskId: null,
  formImportant: false,
  formAssignee: 'office',
};

function todayStr() {
  const d = new Date();
  const y = d.getFullYear();
  const m = String(d.getMonth() + 1).padStart(2, '0');
  const day = String(d.getDate()).padStart(2, '0');
  return `${y}-${m}-${day}`;
}
function strToDate(s) {
  if (!s) return null;
  const [y, m, d] = s.split('-').map(Number);
  return new Date(y, m - 1, d);
}
function daysBetween(a, b) {
  const A = strToDate(a), B = strToDate(b);
  return Math.round((B - A) / 86400000);
}
function fmtDate(s) {
  if (!s) return '';
  const today = todayStr();
  const diff = daysBetween(today, s);
  if (diff === 0) return 'היום';
  if (diff === 1) return 'מחר';
  if (diff === -1) return 'אתמול';
  if (diff < 0 && diff >= -7) return `לפני ${-diff} ימים`;
  if (diff > 0 && diff <= 7) return `בעוד ${diff} ימים`;
  const d = strToDate(s);
  return `${d.getDate()}.${d.getMonth() + 1}`;
}
function fmtDateLong(s) {
  if (!s) return '';
  const d = strToDate(s);
  return `${HEBREW_DAYS[d.getDay()]}, ${d.getDate()} ב${HEBREW_MONTHS[d.getMonth()]}`;
}
function fmtTime(ts) {
  if (!ts) return '';
  const d = new Date(ts);
  return `${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
}
function fmtRelTime(ts) {
  if (!ts) return '';
  const diff = Date.now() - ts;
  const min = Math.floor(diff / 60000);
  if (min < 1) return 'הרגע';
  if (min < 60) return `לפני ${min} דק׳`;
  const hr = Math.floor(min / 60);
  if (hr < 24) return `לפני ${hr} שע׳`;
  const days = Math.floor(hr / 24);
  if (days < 7) return `לפני ${days} ${days === 1 ? 'יום' : 'ימים'}`;
  const d = new Date(ts);
  return `${d.getDate()}.${d.getMonth() + 1}`;
}
function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

// ============ Storage ============
let firebase = null;
let useFirebase = false;
let firebaseDb = null;

async function initStorage() {
  const cloudStatus = document.getElementById('cloudStatus');
  const cloudText = document.getElementById('cloudStatusText');
  const hasConfig = FIREBASE_CONFIG && typeof FIREBASE_CONFIG.apiKey === 'string' && FIREBASE_CONFIG.apiKey.length > 10;

  if (hasConfig) {
    try {
      const appMod = await import('https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js');
      const dbMod = await import('https://www.gstatic.com/firebasejs/10.7.0/firebase-database.js');
      const app = appMod.initializeApp(FIREBASE_CONFIG);
      firebaseDb = dbMod.getDatabase(app);
      firebase = dbMod;
      useFirebase = true;
      const tasksRef = dbMod.ref(firebaseDb, 'tasks');
      dbMod.onValue(tasksRef, (snap) => {
        state.tasks = snap.val() || {};
        cleanupOldCompleted();
        if (state.user) render();
      });
      cloudStatus.classList.add('connected');
      cloudText.textContent = '✓ סנכרון בזמן אמת פעיל';
      return;
    } catch (e) {
      console.error('Firebase init failed:', e);
      cloudText.textContent = 'שגיאת חיבור — מצב מקומי';
    }
  } else {
    cloudText.textContent = 'מצב מקומי · ללא סנכרון';
  }
  loadLocal();
}
function loadLocal() {
  try {
    const data = localStorage.getItem('officeTasks');
    state.tasks = data ? JSON.parse(data) : {};
  } catch (e) { state.tasks = {}; }
  cleanupOldCompleted();
}
function saveLocal() {
  try { localStorage.setItem('officeTasks', JSON.stringify(state.tasks)); }
  catch (e) { console.error(e); }
}
async function persistTask(task) {
  state.tasks[task.id] = task;
  if (useFirebase) {
    try { await firebase.set(firebase.ref(firebaseDb, `tasks/${task.id}`), task); }
    catch (e) { console.error(e); saveLocal(); render(); }
  } else { saveLocal(); render(); }
}
async function persistUpdate(taskId, updates) {
  if (!state.tasks[taskId]) return;
  Object.assign(state.tasks[taskId], updates);
  if (useFirebase) {
    try { await firebase.update(firebase.ref(firebaseDb, `tasks/${taskId}`), updates); }
    catch (e) { console.error(e); saveLocal(); render(); }
  } else { saveLocal(); render(); }
}
async function persistDelete(taskId) {
  delete state.tasks[taskId];
  if (useFirebase) {
    try { await firebase.remove(firebase.ref(firebaseDb, `tasks/${taskId}`)); }
    catch (e) { console.error(e); saveLocal(); render(); }
  } else { saveLocal(); render(); }
}
function cleanupOldCompleted() {
  const cutoff = Date.now() - (2 * 86400000);
  const toDelete = [];
  for (const id in state.tasks) {
    const t = state.tasks[id];
    if (t && t.status === 'done' && t.completedAt && t.completedAt < cutoff) toDelete.push(id);
  }
  toDelete.forEach(id => persistDelete(id));
}

function showToast(msg) {
  const toast = document.getElementById('toast');
  toast.textContent = msg;
  toast.classList.add('show');
  clearTimeout(toast._timer);
  toast._timer = setTimeout(() => toast.classList.remove('show'), 2000);
}

function login(user) {
  state.user = user;
  localStorage.setItem('currentUser', user);
  document.getElementById('loginScreen').hidden = true;
  document.getElementById('mainApp').hidden = false;
  state.formAssignee = user === 'moshe' ? 'office' : 'moshe';
  updateHeader();
  render();
}
function logout() {
  state.user = null;
  localStorage.removeItem('currentUser');
  document.getElementById('loginScreen').hidden = false;
  document.getElementById('mainApp').hidden = true;
}
function updateHeader() {
  const u = state.user;
  document.getElementById('userPill').dataset.user = u;
  document.getElementById('userAvatar').textContent = USER_INITIAL[u];
  document.getElementById('userLabel').textContent = USER_LABEL[u];
  const today = new Date();
  document.getElementById('dateNum').textContent = today.getDate();
  document.getElementById('dateDay').textContent = HEBREW_DAYS[today.getDay()];
  document.getElementById('dateMonth').textContent = `${HEBREW_MONTHS[today.getMonth()]} ${today.getFullYear()}`;
}

function getVisibleTasks() {
  const today = todayStr();
  const all = Object.values(state.tasks).filter(t => t && t.id);
  let filtered;
  if (state.activeTab === 'active') {
    // All non-done tasks regardless of date
    filtered = all.filter(t => t.status !== 'done');
  } else {
    filtered = all.filter(t => t.status === 'done');
  }
  if (state.filterAssignee !== 'all') {
    filtered = filtered.filter(t => t.assignedTo === state.filterAssignee);
  }
  if (state.search) {
    const q = state.search.toLowerCase();
    filtered = filtered.filter(t =>
      (t.title || '').toLowerCase().includes(q) ||
      (t.description || '').toLowerCase().includes(q)
    );
  }
  filtered.sort((a, b) => {
    if (state.activeTab === 'completed') return (b.completedAt || 0) - (a.completedAt || 0);
    // 1. Important first
    const aImp = a.important ? 1 : 0;
    const bImp = b.important ? 1 : 0;
    if (aImp !== bImp) return bImp - aImp;
    // 2. By due date — earliest first; tasks without due date go to the end
    const aHasDue = a.dueDate ? 1 : 0;
    const bHasDue = b.dueDate ? 1 : 0;
    if (aHasDue !== bHasDue) return bHasDue - aHasDue;
    if (a.dueDate && b.dueDate && a.dueDate !== b.dueDate) {
      return a.dueDate.localeCompare(b.dueDate);
    }
    // 3. By creation order — oldest first
    return (a.createdAt || 0) - (b.createdAt || 0);
  });
  return filtered;
}
function getCounts() {
  const all = Object.values(state.tasks).filter(t => t && t.id);
  return {
    active: all.filter(t => t.status !== 'done').length,
    completed: all.filter(t => t.status === 'done').length,
  };
}

function render() {
  const counts = getCounts();
  document.getElementById('cnt-active').textContent = counts.active;
  document.getElementById('cnt-completed').textContent = counts.completed;
  document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.tab === state.activeTab));
  document.querySelectorAll('#assigneeFilter button').forEach(b => b.classList.toggle('active', b.dataset.assignee === state.filterAssignee));

  const list = document.getElementById('taskList');
  const tasks = getVisibleTasks();

  if (tasks.length === 0) {
    let msg, hint;
    if (state.activeTab === 'active') {
      msg = state.search || state.filterAssignee !== 'all' ? 'אין תוצאות' : 'הכל מסודר';
      hint = state.search || state.filterAssignee !== 'all' ? 'נסה חיפוש אחר' : 'אין משימות פתוחות';
    } else {
      msg = 'אין משימות שבוצעו'; hint = 'משימות מבוצעות נמחקות אחרי יומיים';
    }
    list.innerHTML = `<div class="empty-state"><div class="icon">${state.activeTab === 'completed' ? '✓' : '·'}</div><div class="text">${msg}</div><div class="hint">${hint}</div></div>`;
    return;
  }

  list.innerHTML = tasks.map(renderTaskCard).join('');
  list.querySelectorAll('[data-task-id]').forEach(el => {
    el.addEventListener('click', () => openDetail(el.dataset.taskId));
  });
}
function renderTaskCard(t) {
  const today = todayStr();
  const isOverdue = t.dueDate && t.dueDate < today && t.status !== 'done';
  const isDueToday = t.dueDate === today;
  const isFuture = t.dueDate && t.dueDate > today;
  const cls = ['task-card'];
  if (t.important && t.status !== 'done') cls.push('important');
  if (isOverdue) cls.push('overdue');
  if (t.status === 'done') cls.push('done');
  const commentCount = (t.comments || []).length;
  const status = STATUS[t.status] || STATUS.open;
  const badges = [];
  if (isOverdue) badges.push(`<span class="badge badge-overdue">באיחור · ${fmtDate(t.dueDate)}</span>`);
  else if (isDueToday) badges.push(`<span class="badge badge-due-today">יעד היום</span>`);
  else if (isFuture) badges.push(`<span class="badge badge-future">יעד · ${fmtDate(t.dueDate)}</span>`);
  return `
    <div class="${cls.join(' ')}" data-task-id="${t.id}">
      <div class="task-head">
        ${t.important && t.status !== 'done' ? '<div class="task-star">★</div>' : ''}
        <div class="task-title">${escapeHtml(t.title || '')}</div>
      </div>
      <div class="task-meta">
        ${t.status !== 'done' ? `<span class="status-pill ${status.cls}"><span class="status-dot"></span>${status.label}</span>` : ''}
        <span class="task-meta-item">→ ${ASSIGN_LABEL[t.assignedTo]}</span>
        <span class="task-meta-item author">ע״י <strong>${USER_LABEL[t.createdBy]}</strong></span>
        ${commentCount > 0 ? `<span class="task-meta-item">💬 ${commentCount}</span>` : ''}
        ${badges.join(' ')}
      </div>
    </div>
  `;
}

function openModal(id) {
  document.getElementById(id).classList.add('show');
  document.body.style.overflow = 'hidden';
}
function closeModal(id) {
  document.getElementById(id).classList.remove('show');
  document.body.style.overflow = '';
}

function openTaskForm(taskId = null) {
  state.editingTaskId = taskId;
  const titleEl = document.getElementById('taskTitle');
  const descEl = document.getElementById('taskDesc');
  const dueEl = document.getElementById('taskDue');
  const modalTitle = document.getElementById('taskModalTitle');
  if (taskId) {
    const t = state.tasks[taskId];
    if (!t) return;
    modalTitle.textContent = 'עריכת משימה';
    titleEl.value = t.title || '';
    descEl.value = t.description || '';
    dueEl.value = t.dueDate || '';
    state.formAssignee = t.assignedTo;
    state.formImportant = !!t.important;
  } else {
    modalTitle.textContent = 'משימה חדשה';
    titleEl.value = '';
    descEl.value = '';
    dueEl.value = '';
    state.formAssignee = state.user === 'moshe' ? 'office' : 'moshe';
    state.formImportant = false;
  }
  document.querySelectorAll('#assignToggle button').forEach(b => {
    b.classList.toggle('active', b.dataset.assign === state.formAssignee);
  });
  const impRow = document.getElementById('importantToggle');
  impRow.classList.toggle('checked', state.formImportant);
  document.getElementById('importantCheck').textContent = state.formImportant ? '✓' : '';
  openModal('taskModal');
  setTimeout(() => titleEl.focus(), 250);
}

async function saveTaskFromForm() {
  const title = document.getElementById('taskTitle').value.trim();
  if (!title) {
    document.getElementById('taskTitle').focus();
    showToast('נא להזין כותרת');
    return;
  }
  const description = document.getElementById('taskDesc').value.trim();
  const dueDate = document.getElementById('taskDue').value || null;
  const btn = document.getElementById('saveTaskBtn');
  btn.disabled = true;
  btn.textContent = 'שומר...';
  try {
    if (state.editingTaskId) {
      await persistUpdate(state.editingTaskId, {
        title, description: description || '',
        dueDate, assignedTo: state.formAssignee, important: !!state.formImportant,
      });
      showToast('המשימה עודכנה');
    } else {
      const id = 't_' + Date.now() + '_' + Math.random().toString(36).slice(2, 8);
      const task = {
        id, title, description: description || '',
        assignedTo: state.formAssignee,
        createdBy: state.user,
        createdAt: Date.now(),
        originalDate: todayStr(),
        dueDate: dueDate || null,
        important: !!state.formImportant,
        status: 'open',
        completedAt: null,
        comments: [],
      };
      await persistTask(task);
      showToast('המשימה נוספה');
    }
    closeModal('taskModal');
  } catch (e) {
    console.error(e);
    showToast('שגיאה בשמירה');
  } finally {
    btn.disabled = false;
    btn.textContent = 'שמירה';
  }
}

function openDetail(taskId) {
  state.viewingTaskId = taskId;
  const t = state.tasks[taskId];
  if (!t) return;
  const status = STATUS[t.status] || STATUS.open;
  const today = todayStr();
  const isOverdue = t.dueDate && t.dueDate < today && t.status !== 'done';
  let dueDisplay = '—';
  if (t.dueDate) {
    dueDisplay = fmtDateLong(t.dueDate);
    if (isOverdue) dueDisplay += ' · באיחור';
  }
  let createdDisplay = '';
  if (t.originalDate) {
    createdDisplay = fmtDateLong(t.originalDate);
    if (t.createdAt) createdDisplay += ` · ${fmtTime(t.createdAt)}`;
  }
  const commentsHtml = (t.comments || []).map(c => `
    <div class="comment ${c.author === state.user ? 'own' : ''}">
      <div class="comment-head">
        <span class="author">${USER_LABEL[c.author] || c.author}</span>
        <span>${fmtRelTime(c.time)}</span>
      </div>
      <div class="comment-text">${escapeHtml(c.text)}</div>
    </div>
  `).join('') || '<div class="comments-empty">אין הערות עדיין</div>';

  document.getElementById('detailBody').innerHTML = `
    <div class="detail-title">
      ${t.important && t.status !== 'done' ? '<span style="color:var(--accent);">★</span> ' : ''}
      ${escapeHtml(t.title)}
    </div>
    <div class="detail-meta-grid">
      <div class="detail-meta-row">
        <span class="detail-meta-label">סטטוס</span>
        <span class="detail-meta-value">
          <span class="status-pill ${status.cls}"><span class="status-dot"></span>${status.label}</span>
        </span>
      </div>
      <div class="detail-meta-row">
        <span class="detail-meta-label">למי המשימה</span>
        <span class="detail-meta-value">${ASSIGN_LABEL[t.assignedTo]}</span>
      </div>
      <div class="detail-meta-row">
        <span class="detail-meta-label">נכתב ע״י</span>
        <span class="detail-meta-value">${USER_LABEL[t.createdBy]}</span>
      </div>
      <div class="detail-meta-row">
        <span class="detail-meta-label">נוצר</span>
        <span class="detail-meta-value">${createdDisplay}</span>
      </div>
      <div class="detail-meta-row">
        <span class="detail-meta-label">תאריך יעד</span>
        <span class="detail-meta-value ${isOverdue ? 'overdue' : ''}">${dueDisplay}</span>
      </div>
      ${t.status === 'done' && t.completedAt ? `
      <div class="detail-meta-row">
        <span class="detail-meta-label">בוצע</span>
        <span class="detail-meta-value">${fmtRelTime(t.completedAt)}</span>
      </div>` : ''}
    </div>
    <div class="detail-desc ${!t.description ? 'empty' : ''}">${
      t.description ? escapeHtml(t.description) : 'אין פרטים נוספים'
    }</div>
    ${t.status !== 'done' ? `
    <div class="section-title">שינוי סטטוס</div>
    <div class="status-grid" id="statusGrid">
      ${Object.entries(STATUS).filter(([k]) => k !== 'done').map(([k, v]) => `
        <button class="status-option ${t.status === k ? 'active' : ''}" data-status="${k}">
          <span class="status-dot"></span> ${v.label}
        </button>
      `).join('')}
    </div>` : ''}
    <div class="section-title">הערות (${(t.comments || []).length})</div>
    <div class="comments-list">${commentsHtml}</div>
    ${t.status !== 'done' ? `
    <div class="comment-form">
      <input type="text" id="newComment" placeholder="הוסף הערה..." maxlength="500">
      <button id="addCommentBtn">שלח</button>
    </div>` : ''}
  `;

  const completeBtn = document.getElementById('completeBtn');
  const editBtn = document.getElementById('editBtn');
  if (t.status === 'done') {
    completeBtn.textContent = 'החזר לפעילות';
    completeBtn.className = 'btn btn-secondary';
    completeBtn.style.flex = '1';
    editBtn.style.display = 'none';
  } else {
    completeBtn.textContent = 'סמן כבוצע ✓';
    completeBtn.className = 'btn btn-success';
    editBtn.style.display = '';
  }

  document.querySelectorAll('#statusGrid .status-option').forEach(b => {
    b.addEventListener('click', async () => {
      await persistUpdate(taskId, { status: b.dataset.status });
      openDetail(taskId);
    });
  });
  const addCommentBtn = document.getElementById('addCommentBtn');
  if (addCommentBtn) {
    const addComment = async () => {
      const input = document.getElementById('newComment');
      const text = input.value.trim();
      if (!text) return;
      const comments = [...(state.tasks[taskId].comments || []), {
        author: state.user, text, time: Date.now()
      }];
      input.value = '';
      await persistUpdate(taskId, { comments });
      openDetail(taskId);
    };
    addCommentBtn.addEventListener('click', addComment);
    document.getElementById('newComment').addEventListener('keydown', (e) => {
      if (e.key === 'Enter') addComment();
    });
  }
  openModal('detailModal');
}

async function toggleComplete() {
  const id = state.viewingTaskId;
  if (!id) return;
  const t = state.tasks[id];
  if (!t) return;
  if (t.status === 'done') {
    await persistUpdate(id, { status: 'open', completedAt: null });
    showToast('הוחזר לפעילות');
  } else {
    await persistUpdate(id, { status: 'done', completedAt: Date.now() });
    showToast('סומן כבוצע ✓');
  }
  closeModal('detailModal');
}
async function deleteCurrentTask() {
  const id = state.viewingTaskId;
  if (!id) return;
  if (!confirm('למחוק את המשימה לצמיתות?')) return;
  await persistDelete(id);
  showToast('המשימה נמחקה');
  closeModal('detailModal');
}
function editCurrentTask() {
  const id = state.viewingTaskId;
  closeModal('detailModal');
  setTimeout(() => openTaskForm(id), 280);
}

function bindEvents() {
  document.querySelectorAll('.user-btn').forEach(b => {
    b.addEventListener('click', () => login(b.dataset.user));
  });
  document.getElementById('logoutBtn').addEventListener('click', logout);
  document.querySelectorAll('.tab').forEach(t => {
    t.addEventListener('click', () => { state.activeTab = t.dataset.tab; render(); });
  });
  document.querySelectorAll('#assigneeFilter button').forEach(b => {
    b.addEventListener('click', () => { state.filterAssignee = b.dataset.assignee; render(); });
  });
  document.getElementById('searchInput').addEventListener('input', (e) => {
    state.search = e.target.value; render();
  });
  document.getElementById('addBtn').addEventListener('click', () => openTaskForm());
  document.querySelectorAll('#assignToggle button').forEach(b => {
    b.addEventListener('click', () => {
      state.formAssignee = b.dataset.assign;
      document.querySelectorAll('#assignToggle button').forEach(x => {
        x.classList.toggle('active', x.dataset.assign === state.formAssignee);
      });
    });
  });
  document.getElementById('importantToggle').addEventListener('click', () => {
    state.formImportant = !state.formImportant;
    const row = document.getElementById('importantToggle');
    row.classList.toggle('checked', state.formImportant);
    document.getElementById('importantCheck').textContent = state.formImportant ? '✓' : '';
  });
  document.getElementById('saveTaskBtn').addEventListener('click', saveTaskFromForm);
  document.getElementById('taskTitle').addEventListener('keydown', (e) => {
    if (e.key === 'Enter') { e.preventDefault(); saveTaskFromForm(); }
  });
  document.getElementById('completeBtn').addEventListener('click', toggleComplete);
  document.getElementById('deleteBtn').addEventListener('click', deleteCurrentTask);
  document.getElementById('editBtn').addEventListener('click', editCurrentTask);
  document.querySelectorAll('[data-close]').forEach(b => {
    b.addEventListener('click', () => closeModal(b.dataset.close));
  });
  document.querySelectorAll('.modal-backdrop').forEach(m => {
    m.addEventListener('click', (e) => { if (e.target === m) closeModal(m.id); });
  });
  setInterval(cleanupOldCompleted, 3600000);
  let lastDay = todayStr();
  setInterval(() => {
    const today = todayStr();
    if (today !== lastDay) { lastDay = today; updateHeader(); render(); }
  }, 60000);
}

async function init() {
  bindEvents();
  await initStorage();
  // Migrate old "secretary" user to "office"
  const savedUser = localStorage.getItem('currentUser');
  let user = savedUser;
  if (savedUser === 'secretary') {
    user = 'office';
    localStorage.setItem('currentUser', 'office');
  }
  // Migrate old tasks with createdBy "secretary" to "office"
  let migrated = false;
  for (const id in state.tasks) {
    const t = state.tasks[id];
    if (t && t.createdBy === 'secretary') { t.createdBy = 'office'; migrated = true; }
  }
  if (migrated && !useFirebase) saveLocal();

  if (user && (user === 'moshe' || user === 'office')) login(user);
}
init();
</script>
</body>
</html>
